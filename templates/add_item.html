<!DOCTYPE html>
<html>
<head>
    <title>Add Inventory Item</title>
</head>
<body>

    <h1>Add New Inventory Item</h1>

    <form method="POST">
        <label>Item Name:</label><br>
        <input type="text" name="name" required><br><br>

        <label>Category:</label><br>
        <input type="text" name="category" placeholder="Example: Wire, Tools, Hardware" required><br><br>

        <label>Current Quantity:</label><br>
        <input type="number" name="quantity" min="0" required><br><br>

        <label>Minimum Quantity Before Reorder:</label><br>
        <input type="number" name="minimum_quantity" min="0" required><br><br>

        <button type="submit">Add Item</button>
    </form>

    <br>
    <a href="/">Back to Inventory</a>

</body>
</html>
