<!DOCTYPE html>
<html>
<head>
    <title>Assign Item</title>
</head>
<body>

    <h1>Assign Item to Installer</h1>

    <form method="POST">
        <label>Installer Name:</label><br>
        <input type="text" name="installer_name" required><br><br>

        <label>Select Item:</label><br>
        <select name="item_id" required>
            {% for item in items %}
                <option value="{{ item.id }}">
                    {{ item.name }} — Available: {{ item.quantity }}
                </option>
            {% endfor %}
        </select><br><br>

        <label>Quantity Assigned:</label><br>
        <input type="number" name="quantity_assigned" min="1" required><br><br>

        <button type="submit">Assign Item</button>
    </form>

    <br>
    <a href="/">Back to Inventory</a>

</body>
</html>
